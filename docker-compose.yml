version: "3.9"

services:
  # 🗃️ PostgreSQL Database (local, optional now)
  db:
    image: postgres:16
    ports:
      - "${DB_PORT_HOST:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 30s

  # 🛍️ Products Service (Go)
  products:
    build:
      context: ./services/products
      dockerfile: dockerfile
    ports:
      - "${PORT_PRODUCTS:-4001}:4001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/graphql"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s

  # 📦 Orders Service (Go)
  orders:
    build:
      context: ./services/orders
      dockerfile: dockerfile
    ports:
      - "${PORT_ORDERS:-4003}:4003"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4003/graphql"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s

  # 🧍 Users Service (Go)
  users:
    build:
      context: ./services/users
      dockerfile: dockerfile
    ports:
      - "${PORT_USERS:-4002}:4002"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4002/graphql"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s

  # Gradio Frontend Service (Python)
  gradio-ui:
    build:
      context: ./gradio_ui
      dockerfile: dockerfile
    ports:
      - "4004:10000"
    environment:
      - PORT=10000
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=10000
      - GRADIO_SSR_MODE=false
      - no_proxy=localhost,127.0.0.1,0.0.0.0
      - GATEWAY_URL=http://gateway:10000/query
    depends_on:
      - gateway

  # Seed runs after services create tables (local DB only; not used with Neon)
  db-seed:
    image: postgres:16
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./database/init/01-seed-data.sql:/seed-data.sql
    command: >
      bash -c "
        echo 'Skipping local seed because services use Neon'
      "
    restart: "no"

  # 🚪 Apollo Gateway (Node.js)
  gateway:
    build:
      context: .
      dockerfile: gateway/dockerfile
    ports:
      - "${PORT_GATEWAY:-4000}:10000"
    depends_on:
      orders:
        condition: service_started
      users:
        condition: service_started
      products:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
